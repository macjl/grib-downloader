# grib-downloader configuration
#
# Each source downloads one model into one directory — point
# signalk-grib-weather-provider at the same directories.
# bbox: [latMin, lonMin, latMax, lonMax] (GFS only — server-side subsetting)

interval_minutes: 10   # poll interval in --loop mode

sources:
  - name: gfs-025
    model: gfs
    resolution: 0p25            # 0p25 | 0p50 | 1p00
    directory: /data/gfs-025
    bbox: [30, -10, 52, 15]     # Western Med / Bay of Biscay
    steps: {from: 0, to: 24, by: 3}
    archive_runs: 0          # runs archivés dans <dir>/archive/ (0 = aucun)

  - name: gfs-050
    model: gfs
    resolution: 0p50
    directory: /data/gfs-050
    bbox: [25, -25, 60, 20]
    steps: {from: 24, to: 120, by: 6}
    archive_runs: 0          # runs archivés dans <dir>/archive/ (0 = aucun)

  - name: arome-0025
    model: arome
    resolution: "0025"          # "0025" (0.025°) | "001" (0.01°)
    directory: /data/arome-0025
    packages: [SP1]             # parameter packages (SP1 = main surface fields)
    groups: ["00H06H", "07H12H", "13H18H", "19H24H"]   # time ranges (default: all)
    archive_runs: 0          # runs archivés dans <dir>/archive/ (0 = aucun)

  - name: arpege-01
    model: arpege
    resolution: "01"            # "01" (0.1° Europe) | "025" (0.25° global)
    directory: /data/arpege-01
    packages: [SP1]
    groups: ["000H012H", "013H024H", "025H036H", "037H048H"]
    archive_runs: 0          # runs archivés dans <dir>/archive/ (0 = aucun)

  - name: icon-eu
    model: icon-eu
    directory: /data/icon-eu
    steps: {from: 0, to: 48, by: 3}
    # variables: [t_2m, u_10m, v_10m, vmax_10m, pmsl, relhum_2m, tot_prec, clct]
    archive_runs: 0          # runs archivés dans <dir>/archive/ (0 = aucun)
